  <body>
    <!-- Netlify Bot Catching Form — Aligned 1:1 with React Component State -->
    <form
      name="inquiry"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      style="display: none;"
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="inquiry" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="eventDate" />
      <input type="text" name="location" />
      <input type="text" name="eventType" />
      <input type="text" name="guestCount" />
      <input type="text" name="eventTiming" />
      <textarea name="equipmentProvided"></textarea>
      <textarea name="atmosphere"></textarea>
      <input type="text" name="plannerContact" />
      <input type="text" name="hearAbout" />
      <input type="text" name="bot-field" />
    </form>
